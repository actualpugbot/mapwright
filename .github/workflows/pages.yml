name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: VITE_BASE_PATH=/mapwright/ npm run build

      - name: Publish
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          pages_dir="$(mktemp -d)"
          cp -a dist/. "$pages_dir/"
          touch "$pages_dir/.nojekyll"

          git -C "$pages_dir" init -b gh-pages
          git -C "$pages_dir" config user.name "github-actions[bot]"
          git -C "$pages_dir" config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C "$pages_dir" add -A
          git -C "$pages_dir" commit -m "Deploy GitHub Pages"
          git -C "$pages_dir" remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git -C "$pages_dir" push --force origin gh-pages
