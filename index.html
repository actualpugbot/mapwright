<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <meta name="theme-color" content="#eef0ed" />
    <!-- Resolve theme before first paint to avoid a flash of the wrong mode.
         Mirrors the persisted Zustand value (key "mapwright"); falls back to
         the OS preference. App.tsx keeps <html> in sync after hydration. -->
    <script>
      (function () {
        try {
          var theme = null;
          var stored = localStorage.getItem("mapwright");
          if (stored) theme = JSON.parse(stored)?.state?.theme;
          if (theme !== "light" && theme !== "dark") {
            theme = window.matchMedia("(prefers-color-scheme: dark)").matches
              ? "dark"
              : "light";
          }
          var root = document.documentElement;
          root.classList.toggle("dark", theme === "dark");
          root.style.colorScheme = theme;
        } catch (e) {}
      })();
    </script>
    <meta
      name="description"
      content="Mapwright — turn any image into buildable Minecraft map art and export a .litematic schematic."
    />
    <link
      rel="preload"
      href="/fonts/hanken-grotesk-latin.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <style>
      :root {
        color-scheme: light;
        background: #eef0ed;
      }
      :root.dark {
        color-scheme: dark;
        background: #0e1318;
      }
      body {
        background: inherit;
      }
    </style>
    <title>Mapwright — Minecraft Map Art Studio</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
